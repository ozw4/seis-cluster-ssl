paths:
  artifact_root: /workspace/artifacts/seis_ssl_cluster
dataset:
  name: f3_facies_benchmark
  version: facies_benchmark_v1
comparison:
  search_root: /workspace/artifacts/seis_ssl_cluster/lithology/f3/facies_benchmark_v1
  output_dir: /workspace/artifacts/seis_ssl_cluster/lithology/f3/facies_benchmark_v1/reports/baseline_comparison
  output_csv: /workspace/artifacts/seis_ssl_cluster/lithology/f3/facies_benchmark_v1/reports/baseline_comparison/comparison_table.csv
  output_markdown: /workspace/artifacts/seis_ssl_cluster/lithology/f3/facies_benchmark_v1/reports/baseline_comparison/comparison_report.md
  figure_dpi: 300
  figures:
    dpi: 300
    font_sizes:
      title: 10
      axis_label: 9
      tick: 8
      legend: 8
      bar_label: 7
    figsize:
      metric: [6.5, 3.6]
      per_class: [8.0, 4.2]
publish:
  enabled: true
  output_dir: results/f3/facies_benchmark_v1/baseline_comparison
  include_figures: true
  max_file_size_mb: 10
