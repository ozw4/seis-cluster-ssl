paths:
  artifact_root: /workspace/artifacts/seis_ssl_cluster
  output_root: /workspace/artifacts/seis_ssl_cluster/pretraining/nopims/pretrain_v1/amp_mae_m075_mse_g0_patchnorm_clip8_agc65_vis01_v1/full_100ep
manifests:
  train: /workspace/artifacts/seis_ssl_cluster/registry/manifests/nopims/pretrain_v1_clean/nopims_amplitude_manifests.json
  train_path_list: /workspace/artifacts/seis_ssl_cluster/registry/splits/nopims/pretrain_v1_clean/train_npy_paths.txt
data:
  local_crop_size:
  - 128
  - 128
  - 128
  min_valid_fraction: 0.1
  max_resample_attempts: 16
  normalized_clip_abs: 8.0
  amplitude_agc:
    enabled: true
    mode: trace_rms_z
    window_z: 65
    eps: 1.0e-3
    clip_abs: 5.0
zero_mask:
  enabled: true
  zero_atol: 0.0
  z_sample_influence_radius: 16
  xy_trace_influence_radius: 1
model:
  patch_size:
  - 8
  - 8
  - 8
  encoder_dim: 384
  encoder_depth: 8
  encoder_heads: 6
  decoder_dim: 256
  decoder_depth: 4
  decoder_heads: 4
masking:
  spatial_mask_ratio: 0.75
  block_size_tokens:
  - 1
  - 1
  - 1
loss:
  reconstruction: mse
  gradient_weight: 0.0
  visible_reconstruction_weight: 0.1
  target_normalization:
    mode: patch_zscore
    eps: 1.0e-06
    min_std: 0.05
train:
  batch_size: 4
  samples_per_epoch: 10000
  epochs: 100
  num_workers: 8
  shuffle: true
  lr: 0.0001
  weight_decay: 0.05
  amp: false
  device: cuda
  seed: 42
  grad_clip_norm: 1.0
visualization:
  mae_debug:
    enabled: true
    every_steps: 1000
    every_epochs: null
    max_samples: 1
    xy_slice_index: null
    xz_slice_y_index: null
    dpi: 160
    clip_percentiles:
    - 1.0
    - 99.0
    columns:
    - input
    - masked_input
    - target
    - prediction
    - abs_error
    - valid_mask
    panel_width: 2.6
    panel_height: 2.4
    invalid_color: lightgray
