stage: visualize_clusters
paths:
  nopims_root: /home/dcuser/data/NOPIMS
  artifact_root: /workspace/artifacts/seis_ssl_cluster
clustering:
  input_dir: /workspace/artifacts/seis_ssl_cluster/runs/clusters/nopims/pretrain_v1
visualization:
  output_dir: /workspace/artifacts/seis_ssl_cluster/runs/figures/clusters/nopims/pretrain_v1
  survey_ids: []
  modes: [token]
  reconstruct_voxel: false
  allow_all_surveys_for_voxel_reconstruction: false
  skip_existing_voxel_labels: true
  max_voxel_output_gib: 50.0
  allow_large_voxel_output: false
  slice_coordinate_space: voxel
  xy_slices: [750]
  xz_slices: [150]
  dpi: 160
  invalid_color: lightgray
  amplitude_underlay:
    enabled: false
    alpha: 0.35
  summaries:
    enabled: true
    include_amplitude_norm: false
data:
  grid_order: [x, y, z]
  volume_format: npy_memmap
  input_channels: 1
  target_channels: 1
  use_context: false
  local_crop_size: [128, 128, 128]
model:
  name: amp_mae3d
  in_channels: 1
  out_channels: 1
  patch_size: [8, 8, 8]
  encoder_dim: 384
  encoder_depth: 8
  encoder_heads: 6
  decoder_dim: 256
  decoder_depth: 4
  decoder_heads: 4
masking:
  spatial_mask_ratio: 0.75
  spatial_mask_mode: block
  block_size_tokens: [2, 2, 2]
loss:
  reconstruction: huber
  huber_delta: 1.0
  gradient_weight: 0.05
  valid_mask_mode: voxel
train:
  batch_size: 4
  samples_per_epoch: 10000
  epochs: 100
  num_workers: 8
  shuffle: true
  lr: 3.0e-5
  weight_decay: 0.05
  amp: false
  device: cuda
  seed: 42
  grad_clip_norm: 1.0
