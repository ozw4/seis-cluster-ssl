stage: cluster_embeddings
paths:
  nopims_root: /home/dcuser/data/NOPIMS
  artifact_root: /workspace/artifacts/seis_ssl_cluster
embeddings:
  input_dir: /workspace/artifacts/seis_ssl_cluster/runs/embeddings/nopims/pretrain_v1
clustering:
  output_dir: /workspace/artifacts/seis_ssl_cluster/runs/clusters/nopims/pretrain_v1
  embedding_normalization: l2
  pca:
    enabled: true
    n_components: 64
    whiten: false
  sample_tokens: 1000000
  method: minibatch_kmeans
  k_values: [6, 8, 10, 12]
  minibatch_size: 8192
  seed: 42
data:
  grid_order: [x, y, z]
  volume_format: npy_memmap
  input_channels: 1
  target_channels: 1
  use_context: false
  local_crop_size: [128, 128, 128]
model:
  name: amp_mae3d
  in_channels: 1
  out_channels: 1
  patch_size: [8, 8, 8]
  encoder_dim: 384
  encoder_depth: 8
  encoder_heads: 6
  decoder_dim: 256
  decoder_depth: 4
  decoder_heads: 4
masking:
  spatial_mask_ratio: 0.75
  spatial_mask_mode: block
  block_size_tokens: [2, 2, 2]
loss:
  reconstruction: huber
  huber_delta: 1.0
  gradient_weight: 0.05
  valid_mask_mode: voxel
train:
  batch_size: 4
  samples_per_epoch: 10000
  epochs: 100
  num_workers: 8
  shuffle: true
  lr: 3.0e-5
  weight_decay: 0.05
  amp: false
  device: cuda
  seed: 42
  grad_clip_norm: 1.0
