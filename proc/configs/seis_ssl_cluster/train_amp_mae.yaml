stage: train_amp_mae
paths:
  nopims_root: /home/dcuser/data/NOPIMS
  artifact_root: /workspace/artifacts/seis_ssl_cluster
manifests:
  train: /workspace/artifacts/seis_ssl_cluster/registry/manifests/nopims/pretrain_v1_clean/nopims_amplitude_manifests.json
  train_path_list: /home/dcuser/data/NOPIMS/inputs/train_npy_paths.txt
data:
  grid_order: [x, y, z]
  volume_format: npy_memmap
  input_channels: 1
  target_channels: 1
  use_context: false
  local_crop_size: [128, 128, 128]
model:
  name: amp_mae3d
  in_channels: 1
  out_channels: 1
  patch_size: [8, 8, 8]
  encoder_dim: 384
  encoder_depth: 8
  encoder_heads: 6
  decoder_dim: 256
  decoder_depth: 4
  decoder_heads: 4
masking:
  spatial_mask_ratio: 0.75
  spatial_mask_mode: block
  block_size_tokens: [2, 2, 2]
loss:
  reconstruction: huber
  huber_delta: 1.0
  gradient_weight: 0.05
  valid_mask_mode: voxel
train:
  batch_size: 4
  samples_per_epoch: 10000
  epochs: 100
  num_workers: 8
  shuffle: true
  lr: 3.0e-5
  weight_decay: 0.05
  amp: false
  device: cuda
  seed: 42
  grad_clip_norm: 1.0
visualization:
  mae_debug:
    enabled: false
    every_steps: 1000
    every_epochs: null
    max_samples: 1
    xy_slice_index: null
    xz_slice_y_index: null
    dpi: 160
    clip_percentiles: [1.0, 99.0]
